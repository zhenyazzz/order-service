services:
  order-service-postgresql:
    image: postgres:18
    container_name: order-service-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-order_service_db}
      POSTGRES_USER: ${POSTGRES_USER:-order_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-order_service_secret}
    ports:
      - "${ORDER_POSTGRES_PORT:-5433}:5432"
    volumes:
      - order-service-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-order_service} -d ${POSTGRES_DB:-order_service_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: order-service-redis
    ports:
      - "${ORDER_REDIS_PORT:-6380}:6379"
    volumes:
      - order-service-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-service-app
    ports:
      - "${ORDER_SERVICE_PORT:-8083}:8083"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://order-service-postgresql:5432/order_service_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-order_service}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-order_service_secret}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://host.docker.internal:8082}
    depends_on:
      order-service-postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  order-service-db-data:
  order-service-redis-data:

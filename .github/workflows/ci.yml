name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  DOCKER_IMAGE: zhenya465/order-service

permissions:
  contents: read

jobs:
  build-test-sonar:
    name: Build, Test & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarQube scanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Verify Docker available
        run: |
          docker info
          docker --version

      - name: Build & test (Maven verify)
        run: mvn -B clean verify -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false

      - name: SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "Skipping SonarQube (SONAR_TOKEN not configured)"
            exit 0
          fi
          set -e
          SONAR_URL="${{ secrets.SONAR_HOST_URL }}"
          if [ -z "$SONAR_URL" ]; then
            SONAR_URL='https://sonarcloud.io'
          elif [[ "$SONAR_URL" != http://* && "$SONAR_URL" != https://* ]]; then
            SONAR_URL="https://${SONAR_URL#//}"
          fi
          mvn -B sonar:sonar \
            -Dsonar.host.url="$SONAR_URL" \
            -Dsonar.verbose=true

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  docker:
    name: Build & Push Docker image to Docker Hub
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-test-sonar
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: zhenya465
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

databaseChangeLog:
  - changeSet:
      id: 1
      author: internship
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: total_price
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_orders_user_id
            tableName: orders
            columns:
              - column:
                  name: user_id
              - column:
                  name: deleted

        - createIndex:
            indexName: idx_orders_status
            tableName: orders
            columns:
              - column:
                  name: status
              - column:
                  name: deleted

        - createTable:
                tableName: items
                columns:
                  - column:
                      name: id
                      type: uuid
                      constraints:
                        primaryKey: true
                        nullable: false
                  - column:
                      name: name
                      type: varchar(255)
                      constraints:
                        nullable: false
                        unique: true
                        uniqueConstraintName: uk_items_name
                  - column:
                      name: price
                      type: decimal(10,2)
                      constraints:
                        nullable: false
                  - column:
                      name: created_at
                      type: timestamp
                      constraints:
                        nullable: false
                  - column:
                      name: updated_at
                      type: timestamp
                      constraints:
                        nullable: false

        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_order
                    references: orders(id)
              - column:
                  name: item_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_item
                    references: items(id)
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false
                    checkConstraint: "quantity > 0"
               
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

        - createIndex:
          indexName: idx_order_items_order_id_deleted
          tableName: order_items
          columns:
            - column:
                name: order_id
            - column:
                name: deleted
                
        - createIndex:
          indexName: idx_order_items_item_id_deleted
          tableName: order_items
          columns:
            - column:
                name: item_id
            - column:
                name: deleted

        - createIndex:
          indexName: uq_order_item_active
          tableName: order_items
          unique: true
          columns:
            - column:
                name: order_id
            - column:
                name: item_id
          where: deleted = false
    




spring:
  datasource:
    url: jdbc:tc:postgresql:18:///order_service_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        registerHealthIndicator: false
        slidingWindowSize: 5
        minimumNumberOfCalls: 2
        waitDurationInOpenState: 1s
        failureRateThreshold: 100
  retry:
    instances:
      user-service:
        maxAttempts: 1
